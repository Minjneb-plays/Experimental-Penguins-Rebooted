<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experimental Penguins</title>
    <!-- Linking external CSS file -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- 1. The main title/heading -->
    <h1>EXPERIMENTAL PENGUINS</h1>

    <!-- 2. Main content container holding the form elements -->
    <div class="login-container">
        
        <!-- Left side: Prompt and Input Box -->
        <div class="form-group">
            <p>Please enter a name for your penguin?</p>
            <input type="text" id="penguin-name">
        </div>

        <!-- Right side: Room Choice Radio Buttons -->
        <div class="room-selection">
            <label class="radio-option">
                <input type="radio" name="room" value="snow" checked>
                <span>Snow Room</span>
            </label>
            <label class="radio-option">
                <input type="radio" name="room" value="north">
                <span>North Pole</span>
            </label>
            <label class="radio-option">
                <input type="radio" name="room" value="crash">
                <span>Crash Site</span>
            </label>
        </div>

    </div>

<button id="next-btn">Next</button>

<script src="index.js"></script>
</body>
</html>
